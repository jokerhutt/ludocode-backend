name: Build and Push Docker Image

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ludocode-backend:latest
            ghcr.io/${{ github.repository_owner }}/ludocode-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max