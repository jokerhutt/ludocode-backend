
server:
  port: 18080

jwt:
  secret: test-secret

piston:
  enabled: false
  base: ${PISTON_BASE}

storage:
  gcs:
    enabled: ${GCS_ENABLED:true}
    bucket: ${GCS_BUCKET_NAME}
    project:
      id: ${GCS_PROJECT_ID}
  local:
    bucket-name: ${LOCAL_BUCKET_NAME:/data/local-bucket}

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl:
          auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

