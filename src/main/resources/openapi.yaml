openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0

paths:
  /api/v1/users/me/onboarding:
    put:
      tags:
      - user-controller
      summary: Submit onboarding form
      description: |
        Completes the onboarding flow for the currently authenticated user.
        This endpoint stores the user's chosen learning path and initial preferences,
        and initializes course progress.
      operationId: submitOnboarding
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingSubmission"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OnboardingResponse"
  /api/v1/users/me/avatar:
    put:
      tags:
      - user-controller
      summary: Update the user's avatar
      description: |
        Updates the user's avatar version and avatar index.
      operationId: changeUserAvatar
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarInfo"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/v1/snapshots/{courseId}:
    get:
      tags:
      - catalog-admin-controller
      summary: Get a course snapshot for the current course id
      operationId: getSnapshotsByCourseId
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CourseSnap"
    put:
      tags:
      - catalog-admin-controller
      operationId: applyCourseSnapshot
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseSnap"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CourseSnap"
  /api/v1/projects/{projectId}:
    get:
      tags:
      - project-controller
      operationId: getProject
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProjectSnapshot"
    put:
      tags:
      - project-controller
      operationId: saveProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSnapshot"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProjectSnapshot"
    delete:
      tags:
      - project-controller
      operationId: deleteProject
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
  /api/v1/progress/courses/current:
    get:
      tags:
      - course-progress-controller
      operationId: getCurrentCourseId
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                format: uuid
    put:
      tags:
      - course-progress-controller
      operationId: updateCurrentCourse
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeCourseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CourseProgressResponseWithEnrolled"
  /api/v1/snapshots/course:
    post:
      tags:
      - catalog-admin-controller
      operationId: createCourse
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseResponse"
  /api/v1/runner/executions:
    post:
      tags:
      - code-runner-controller
      operationId: runProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSnapshot"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RunnerResult"
  /api/v1/projects:
    get:
      tags:
      - project-controller
      operationId: getUserProjects
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      tags:
      - project-controller
      operationId: createProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
  /api/v1/progress/courses/{courseId}/reset:
    post:
      tags:
      - course-progress-controller
      operationId: resetUserCourseProgress
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CourseProgressResponse"
  /api/v1/progress/completion:
    post:
      tags:
      - lesson-completion-controller
      operationId: submitLessonCompletion
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonSubmissionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/LessonCompletionPacket"
  /api/v1/auth/logout:
    post:
      tags:
      - auth-controller
      operationId: logout
      responses:
        "200":
          description: OK
          content: {}
  /api/v1/auth/firebase:
    post:
      tags:
      - auth-controller
      operationId: loginWithFirebase
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserLoginResponse"
  /api/v1/ai/completions:
    post:
      tags:
      - ai-controller
      operationId: handleChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequestBody"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  type: string
  /api/v1/projects/{projectId}/name:
    patch:
      tags:
      - project-controller
      operationId: renameProject
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
  /api/v1/users:
    get:
      tags:
      - user-controller
      operationId: getUsersByIds
      parameters:
      - name: userIds
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
  /api/v1/users/me/preferences:
    get:
      tags:
      - user-controller
      operationId: getUserPreferences
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserPreferences"
  /api/v1/progress/streak:
    get:
      tags:
      - streak-controller
      operationId: getUserStreak
      parameters:
      - name: mode
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/v1/progress/courses:
    get:
      tags:
      - course-progress-controller
      operationId: getProgressByCourseIds
      parameters:
      - name: courseIds
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseProgressResponse"
  /api/v1/progress/courses/enrolled:
    get:
      tags:
      - course-progress-controller
      operationId: getEnrolledCourseIds
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: string
                  format: uuid
  /api/v1/progress/coins:
    get:
      tags:
      - user-coins-controller
      operationId: getStatsListByUserIds
      parameters:
      - name: userIds
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCoinsResponse"
  /api/v1/features:
    get:
      tags:
      - features-controller
      operationId: getActiveFeatures
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ActiveFeaturesResponse"
  /api/v1/credits:
    get:
      tags:
      - ai-credits-controller
      operationId: getAiCredits
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
  /api/v1/catalog/modules:
    get:
      tags:
      - catalog-controller
      operationId: getModulesByIdList
      parameters:
      - name: moduleIds
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleResponse"
  /api/v1/catalog/lessons:
    get:
      tags:
      - catalog-controller
      operationId: getLessonsByIdList
      parameters:
      - name: lessonIds
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LessonResponse"
  /api/v1/catalog/lessons/{lessonId}/exercises:
    get:
      tags:
      - catalog-controller
      operationId: getExercisesByLessonId
      parameters:
      - name: lessonId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExerciseResponse"
  /api/v1/catalog/courses:
    get:
      tags:
      - catalog-controller
      operationId: getAllCourses
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseResponse"
  /api/v1/catalog/courses/{courseId}/tree:
    get:
      tags:
      - catalog-controller
      operationId: getCourseTree
      parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/FlatCourseTreeResponse"
  /api/v1/auth/me:
    get:
      tags:
      - auth-controller
      operationId: getCurrentUser
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/v1/auth/demo:
    get:
      tags:
      - demo-auth-controller
      operationId: loginDemo
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserLoginResponse"
  /api/v1/users/me:
    delete:
      tags:
      - user-controller
      operationId: deleteUser
      responses:
        "200":
          description: OK
components:
  schemas:
    OnboardingSubmission:
      type: object
      properties:
        chosenPath:
          type: string
          enum:
          - DATA
          - IOS
        chosenCourse:
          type: string
          format: uuid
        hasProgrammingExperience:
          type: boolean
      required:
      - chosenCourse
      - chosenPath
      - hasProgrammingExperience
    CourseProgressResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        currentLessonId:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        updatedAt:
          type: string
          format: date-time
      required:
      - courseId
      - currentLessonId
      - id
      - moduleId
      - updatedAt
      - userId
    CourseProgressResponseWithEnrolled:
      type: object
      properties:
        courseProgress:
          $ref: "#/components/schemas/CourseProgressResponse"
        enrolled:
          type: array
          items:
            type: string
            format: uuid
      required:
      - courseProgress
      - enrolled
    OnboardingResponse:
      type: object
      properties:
        refreshedUser:
          $ref: "#/components/schemas/UserResponse"
        preferences:
          $ref: "#/components/schemas/UserPreferences"
        courseProgressResponse:
          $ref: "#/components/schemas/CourseProgressResponseWithEnrolled"
      required:
      - courseProgressResponse
      - preferences
      - refreshedUser
    UserPreferences:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        hasExperience:
          type: boolean
        chosenPath:
          type: string
          enum:
          - DATA
          - IOS
      required:
      - chosenPath
      - hasExperience
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        avatarVersion:
          type: string
        avatarIndex:
          type: integer
          format: int32
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        hasOnboarded:
          type: boolean
      required:
      - avatarIndex
      - avatarVersion
      - createdAt
      - email
      - firstName
      - hasOnboarded
      - id
      - lastName
    AvatarInfo:
      type: object
      properties:
        version:
          type: string
        index:
          type: integer
          format: int32
      required:
      - index
      - version
    CourseSnap:
      type: object
      properties:
        courseId:
          type: string
          format: uuid
        title:
          type: string
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleSnap"
      required:
      - courseId
      - modules
      - title
    ExerciseSnap:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        subtitle:
          type: string
        prompt:
          type: string
        media:
          type: string
        exerciseType:
          type: string
          enum:
          - CLOZE
          - ANALYZE
          - TRIVIA
          - INFO
        correctOptions:
          type: array
          items:
            $ref: "#/components/schemas/OptionSnap"
        distractors:
          type: array
          items:
            $ref: "#/components/schemas/OptionSnap"
      required:
      - correctOptions
      - distractors
      - exerciseType
      - id
      - title
    LessonSnap:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        orderIndex:
          type: integer
          format: int32
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseSnap"
      required:
      - exercises
      - id
      - orderIndex
      - title
    ModuleSnap:
      type: object
      properties:
        moduleId:
          type: string
          format: uuid
        title:
          type: string
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/LessonSnap"
      required:
      - lessons
      - moduleId
      - title
    OptionSnap:
      type: object
      properties:
        content:
          type: string
        answerOrder:
          type: integer
          format: int32
        exerciseOptionId:
          type: string
          format: uuid
      required:
      - content
      - exerciseOptionId
    ProjectFileSnapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        language:
          type: string
          enum:
          - python
          - javascript
          - lua
        content:
          type: string
      required:
      - content
      - language
      - path
    ProjectSnapshot:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        projectName:
          type: string
        projectLanguage:
          type: string
          enum:
          - python
          - javascript
          - lua
        updatedAt:
          type: string
          format: date-time
        files:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFileSnapshot"
      required:
      - files
      - projectId
      - projectLanguage
      - projectName
    ChangeCourseRequest:
      type: object
      properties:
        newCourseId:
          type: string
          format: uuid
      required:
      - newCourseId
    CreateCourseRequest:
      type: object
      properties:
        courseTitle:
          type: string
        requestHash:
          type: string
          format: uuid
      required:
      - courseTitle
      - requestHash
    CourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
      required:
      - id
      - title
    RunnerResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exitCode:
          type: integer
          format: int32
      required:
      - exitCode
      - stderr
      - stdout
    CreateProjectRequest:
      type: object
      properties:
        projectName:
          type: string
        projectLanguage:
          type: string
          enum:
          - python
          - javascript
          - lua
        requestHash:
          type: string
          format: uuid
      required:
      - projectLanguage
      - projectName
      - requestHash
    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSnapshot"
      required:
      - projects
    AttemptToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        value:
          type: string
      required:
      - id
      - value
    ExerciseAttemptRequest:
      type: object
      properties:
        exerciseId:
          type: string
          format: uuid
        isCorrect:
          type: boolean
        answer:
          type: array
          items:
            $ref: "#/components/schemas/AttemptToken"
      required:
      - answer
      - exerciseId
      - isCorrect
    ExerciseSubmissionRequest:
      type: object
      properties:
        exerciseId:
          type: string
          format: uuid
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseAttemptRequest"
        version:
          type: integer
          format: int32
      required:
      - attempts
      - exerciseId
      - version
    LessonSubmissionRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        lessonId:
          type: string
          format: uuid
        submissions:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseSubmissionRequest"
      required:
      - id
      - lessonId
      - submissions
    LessonCompletionPacket:
      type: object
      properties:
        content:
          $ref: "#/components/schemas/LessonCompletionResponse"
        status:
          type: string
          enum:
          - OK
          - COURSE_COMPLETE
          - DUPLICATE
      required:
      - status
    LessonCompletionResponse:
      type: object
      properties:
        newCoins:
          $ref: "#/components/schemas/UserCoinsResponse"
        newStreak:
          $ref: "#/components/schemas/UserStreakResponse"
        newCourseProgress:
          $ref: "#/components/schemas/CourseProgressResponse"
        updatedCompletedLesson:
          $ref: "#/components/schemas/LessonResponse"
        accuracy:
          type: number
      required:
      - accuracy
      - newCoins
      - newCourseProgress
      - newStreak
      - updatedCompletedLesson
    LessonResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        orderIndex:
          type: integer
          format: int32
        isCompleted:
          type: boolean
        completed:
          type: boolean
          writeOnly: true
      required:
      - id
      - isCompleted
      - orderIndex
      - title
    UserCoinsResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coins:
          type: integer
          format: int32
      required:
      - coins
      - id
    UserStreakResponse:
      type: object
      properties:
        current:
          type: integer
          format: int32
        best:
          type: integer
          format: int32
        lastMet:
          type: string
          format: date
      required:
      - best
      - current
    UserLoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        userStats:
          $ref: "#/components/schemas/UserCoinsResponse"
        userStreak:
          $ref: "#/components/schemas/UserStreakResponse"
      required:
      - user
      - userStats
      - userStreak
    ChatRequestBody:
      type: object
      properties:
        id:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/UIMessageRequest"
      required:
      - id
      - messages
    UIMessagePart:
      type: object
      properties:
        type:
          type: string
        text:
          type: string
      required:
      - type
    UIMessageRequest:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum:
          - system
          - user
          - assistant
        parts:
          type: array
          items:
            $ref: "#/components/schemas/UIMessagePart"
        metadata:
          $ref: "#/components/schemas/UIMessageRequestMetadata"
      required:
      - id
      - parts
      - role
    UIMessageRequestMetadata:
      type: object
      properties:
        chatType:
          type: string
          enum:
          - LESSON
          - PROJECT
          - DEFAULT
        targetId:
          type: string
          format: uuid
      required:
      - chatType
    RenameRequest:
      type: object
      properties:
        targetId:
          type: string
          format: uuid
        newName:
          type: string
      required:
      - newName
      - targetId
    ActiveFeaturesResponse:
      type: object
      properties:
        isAIEnabled:
          type: boolean
        isGcsEnabled:
