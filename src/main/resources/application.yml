spring:
  application:
    name: ludocode-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

ai:
  enabled: ${AI_ENABLED:true}
  api:
    key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

jwt:
  secret: ${JWT_SECRET}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: postmessage

cors:
  origins: ${FRONTEND_ORIGINS}

avatar:
  version: v1
  count: 10

app:
  gcs-host:

storage:
  gcs:
    enabled: ${GCS_ENABLED:false}
    bucket: ${GCS_BUCKET_NAME}
    project:
      id: ${GCS_PROJECT_ID}
  local:
    bucket-name: ${LOCAL_BUCKET_NAME:/data/local-bucket}

piston:
  enabled: ${PISTON_ENABLED:true}
  public: https://emkc.org/api/v2/piston
  base: ${PISTON_BASE}

demo:
  enabled: ${DEMO_ENABLED:true}
  token: ${DEMO_TOKEN}
  user-id: ${DEMO_USER_ID}

auth:
  cookie:
    name: jwt
    path: /
    domain: ${COOKIE_DOMAIN:localhost}
    same-site: ${COOKIE_SAME_SITE:Lax}
    secure: ${COOKIE_SECURE:false}
    max-age-seconds: 86400