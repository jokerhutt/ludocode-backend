spring:
  application:
    name: ludocode-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  cache:
    type: redis
  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml
    contexts: ${LIQUIBASE_CONTEXT:dev}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

logging:
  level:
    root: ${LOGGING_LEVEL:INFO}
    com.ludocode.ludocodebackend.commons.configuration.CorsLoggingFilter: ${CORS_LOGGING_LEVEL:WARN}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui
    enabled: true

firebase:
  service:
    json: ${FIREBASE_SERVICE_ACCOUNT_JSON}
    path: ${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}

ai:
  enabled: ${AI_ENABLED:true}
  api:
    key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

jwt:
  secret: ${JWT_SECRET}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: postmessage

cors:
  origins: ${FRONTEND_ORIGINS}

avatar:
  version: v1
  count: 10

app:
  frontend-url: ${FRONTEND_URL}
  gcs-host:

# mode: local, s3, gcs
storage:
  mode: ${STORAGE_MODE:local}

  gcs:
    bucket: ${GCS_BUCKET_NAME}
    project:
      id: ${GCS_PROJECT_ID}
    credentials-json: ${GCS_CREDENTIALS_JSON:}
  s3:
    region: ${AWS_REGION:eu-central-1}
    bucket: ${S3_BUCKET_NAME}
    endpoint: ${S3_ENDPOINT}
  local:
    bucket-name: ${LOCAL_BUCKET_NAME:/data/local-bucket}

piston:
  enabled: ${PISTON_ENABLED:true}
  public: https://emkc.org/api/v2/piston
  base: ${PISTON_BASE}

demo:
  enabled: ${DEMO_ENABLED:true}
  token: ${DEMO_TOKEN}
  user-id: ${DEMO_USER_ID}

auth:
  cookie:
    name: jwt
    path: /
    domain: ${COOKIE_DOMAIN:localhost}
    same-site: ${COOKIE_SAME_SITE:Lax}
    secure: ${COOKIE_SECURE:false}
    max-age-seconds: 86400