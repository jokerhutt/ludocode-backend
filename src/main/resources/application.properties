spring.application.name=ludocode-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

ai.api.key=${GEMINI_API_KEY}
ai.model=gemini-2.5-flash-lite
jwt.secret=${JWT_SECRET}

google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=postmessage
app.gcs.host=
gcs.bucket=${GCS_BUCKET}
gcs.project.id=${GCS_PROJECT_ID}

piston.base=${PISTON_BASE}

auth.cookie.name=jwt
auth.cookie.path=/
auth.cookie.domain=
auth.cookie.same-site=Lax
auth.cookie.secure=false
auth.cookie.max-age-seconds=86400

user.service.base-url=${USER_SERVICE_BASE_URL}
catalog.service.base-url=${CATALOG_SERVICE_BASE_URL}
course-progress.service.base-url=${COURSE_PROGRESS_SERVICE_BASE_URL}
user-stats.service.base-url=${USER_STATS_SERVICE_BASE_URL}
