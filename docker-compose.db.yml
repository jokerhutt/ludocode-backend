services:
  postgres:
    image: postgres:17
    container_name: ludocode-postgres
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORTS}"

volumes:
  pgdata: